<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard | PoultryMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-dark text-white overflow-hidden">

    <div class="d-flex vh-100">
        <div id="sidebar-container"></div>

        <main class="flex-grow-1 overflow-auto">
            
            <div class="d-lg-none p-3 border-bottom border-secondary border-opacity-10 d-flex justify-content-between align-items-center bg-dark sticky-top">
                <div class="d-flex align-items-center gap-2">
                    <div class="bg-cyan p-1 rounded-circle" style="width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-egg-fried text-dark"></i>
                    </div>
                    <span class="fw-bold">PoultryMart</span>
                </div>
                
                <button class="btn menu-btn-mobile" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                    <i class="bi bi-list fs-3"></i>
                </button>
            </div>

            <div class="p-4 p-lg-5">
                <header class="mb-5">
                    <h2 class="fw-bold mb-1">Today's Deliveries</h2>
                    <p class="text-muted small">Saturday, April 4, 2026</p>
                </header>

                <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
                    <div class="col">
                        <div class="glass-panel p-4 rounded-4 h-100">
                            <div class="stat-icon bg-primary bg-opacity-10 text-primary mb-3">
                                <i class="bi bi-box-seam"></i>
                            </div>
                            <h3 class="fw-bold mb-0">0</h3>
                            <small class="text-muted">Total</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="glass-panel p-4 rounded-4 h-100">
                            <div class="stat-icon bg-info bg-opacity-10 text-info mb-3">
                                <i class="bi bi-clock"></i>
                            </div>
                            <h3 class="fw-bold mb-0">0</h3>
                            <small class="text-muted">Active</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="glass-panel p-4 rounded-4 h-100">
                            <div class="stat-icon bg-success bg-opacity-10 text-success mb-3">
                                <i class="bi bi-check2-circle"></i>
                            </div>
                            <h3 class="fw-bold mb-0">0</h3>
                            <small class="text-muted">Done</small>
                        </div>
                    </div>
                </div>

                <section>
                    <h5 class="fw-bold mb-1">Dispatch Queue</h5>
                    <p class="text-muted small mb-4">Tap a delivery to view details</p>

                    <div class="glass-panel py-5 text-center rounded-4 border-dashed border-secondary border-opacity-25">
                        <div class="mb-3 opacity-25">
                            <i class="bi bi-box-seam" style="font-size: 3rem;"></i>
                        </div>
                        <h5 class="fw-bold">No deliveries scheduled</h5>
                        <p class="text-muted small">Check back later for new delivery assignments</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Load the Sidebar
        fetch("../../components/sidebar.html")
            .then(res => {
                if (!res.ok) throw new Error("Sidebar not found. Check path!");
                return res.text();
            })
            .then(data => {
                document.getElementById("sidebar-container").innerHTML = data;
                setupRiderSidebar(); 
            })
            .catch(err => console.error(err));

        function setupRiderSidebar() {
            document.getElementById('role-label').innerText = "DELIVERY APP";
            document.getElementById('user-name').innerText = "Rider #102";
            document.getElementById('user-email').innerText = "rider@poultrymart.ph";

            const nav = document.getElementById('sidebar-nav');
            const links = [
                { name: "Today's Deliveries", icon: "bi-clock-history", url: "rider.html" },
                { name: "Route Map", icon: "bi-geo-alt", url: "route-map.html" },
                { name: "Active Delivery", icon: "bi-box-seam", url: "active-delivery.html" },
                { name: "Completed", icon: "bi-check2-circle", url: "completed.html" }
            ];

            const currentPage = window.location.pathname.split("/").pop();

            if(nav) {
                nav.innerHTML = links.map(link => {
                    const isActive = currentPage === link.url ? 'active' : '';
                    return `
                        <a href="${link.url}" class="nav-link rider-nav-link ${isActive}">
                            <i class="bi ${link.icon} me-3"></i> ${link.name}
                        </a>
                    `;
                }).join('');
            }
        }

        function logout() {
            window.location.href = "../../index.html";
        }
    </script>
</body>
</html>
