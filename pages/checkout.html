<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | PoultryMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

    <div id="navbar"></div>

    <main class="container py-5 flex-grow-1">
        <h1 class="fw-bold mb-4">Checkout</h1>

        <div class="row g-4">
            <div class="col-lg-8">
                
                <div class="glass-panel p-4 mb-4 rounded-4">
                    <h5 class="fw-bold mb-3">Delivery Information</h5>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Delivery Address *</label>
                        <input type="text" class="form-control login-input" value="123 Main Street, Barangay 1, Legazpi City, Albay">
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold">Contact Number *</label>
                        <input type="tel" class="form-control login-input" value="09171234567">
                    </div>
                </div>

                <div class="glass-panel p-4 mb-4 rounded-4">
                    <h5 class="fw-bold mb-3">Delivery Schedule</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold"><i class="bi bi-calendar3 me-2"></i>Delivery Date *</label>
                            <input type="date" class="form-control login-input text-white-50">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold"><i class="bi bi-clock me-2"></i>Time Slot *</label>
                            <select class="form-select login-input text-white-50">
                                <option selected disabled>Select time slot</option>
                                <option>8:00 AM - 10:00 AM</option>
                                <option>10:00 AM - 12:00 PM</option>
                                <option>1:00 PM - 3:00 PM</option>
                                <option>3:00 PM - 5:00 PM</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-4 mb-4 rounded-4">
                    <h5 class="fw-bold mb-3">Payment Method</h5>
                    <div class="payment-group" id="paymentMethods">
                        <div class="form-check custom-radio p-3 mb-2 rounded-3 active-payment" onclick="selectPayment(this)">
                            <input class="form-check-input ms-0 me-3" type="radio" name="payment" id="cod" checked>
                            <label class="form-check-label fw-bold cursor-pointer" for="cod">Cash on Delivery (COD)</label>
                        </div>
                        <div class="form-check custom-radio p-3 rounded-3" onclick="selectPayment(this)">
                            <input class="form-check-input ms-0 me-3" type="radio" name="payment" id="gcash">
                            <label class="form-check-label fw-bold cursor-pointer" for="gcash">GCash (Pay Upon Delivery)</label>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-4 mb-4 rounded-4">
                    <h5 class="fw-bold mb-3">Promotional Code</h5>
                    <div class="input-group">
                        <input type="text" class="form-control login-input" placeholder="Enter code here">
                        <button class="btn btn-outline-cyan px-4">Apply</button>
                    </div>
                </div>

                <div class="glass-panel p-4 rounded-4">
                    <h5 class="fw-bold mb-3">Special Instructions</h5>
                    <textarea class="form-control login-input" rows="3" placeholder="Notes for the rider (e.g., 'Leave at the gate')"></textarea>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="glass-panel p-4 rounded-4 sticky-top" style="top: 100px;">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    
                    <div id="checkout-items-preview" class="mb-3">
                        <div class="d-flex justify-content-between small text-white-50 mb-2">
                            <span>Boneless Chicken Thighs × 1</span>
                            <span>₱0.00</span>
                        </div>
                    </div>

                    <hr class="border-secondary opacity-25">
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-white-50">Subtotal</span>
                        <span id="summary-subtotal" class="fw-bold">₱0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-white-50">Delivery Fee</span>
                        <span class="fw-bold">₱50.00</span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <span class="d-block fw-bold fs-5">Estimated Total</span>
                            <small class="text-white-50" style="font-size: 0.7rem;">*Final total based on actual weight</small>
                        </div>
                        <span id="summary-total" class="fs-4 fw-bold text-cyan">₱0.00</span>
                    </div>

                    <button class="btn btn-cyan w-100 py-3 fw-bold shadow-glow rounded-3" onclick="confirmOrder()">
                        Confirm Order
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        // Load UI Components
        fetch("../components/navbar.html").then(r => r.text()).then(d => document.getElementById("navbar").innerHTML = d);
        fetch("../components/footer.html").then(r => r.text()).then(d => document.getElementById("footer-container").innerHTML = d);

        function confirmOrder() {
            alert("Order confirmed! Your poultry is being prepared.");
            localStorage.removeItem('cart_items'); // Clear cart after order
            window.location.href = "dashboard/customer.html";
        }
        function selectPayment(element) {
            const options = document.querySelectorAll('.custom-radio');
            options.forEach(opt => opt.classList.remove('active-payment'));

            element.classList.add('active-payment');

            const radio = element.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;
        }
    </script>
</body>
</html>
