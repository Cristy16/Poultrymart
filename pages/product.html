<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | PoultryMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="bg-dark text-white">

    <div id="navbar"></div>

    <main class="container py-5">
        <a href="catalog.html" class="text-decoration-none text-white mb-4 d-inline-block">
            <i class="bi bi-arrow-left"></i> Back to Products
        </a>

        <div class="row g-5">
            <div class="col-lg-6">
                <div class="product-detail-img-wrapper">
                    <img id="main-img" src="" class="img-fluid rounded-4 shadow-lg" alt="">
                </div>
            </div>

            <div class="col-lg-6">
                <div id="product-details-content">
                    <h1 id="p-name" class="fw-bold mb-1"></h1>
                    <p id="p-category" class="text-white mb-3"></p>
                    
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <div class="text-warning">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-half"></i>
                        </div>
                        <span class="fw-bold" id="p-rating"></span>
                        <span class="text-white" id="p-reviews"></span>
                    </div>

                    <div class="price-card p-4 rounded-4 mb-4" style="background: rgba(255,255,255,0.03);">
                        <div class="d-flex align-items-baseline gap-2">
                            <h2 class="text-cyan fw-bold mb-0" id="p-price"></h2>
                            <span class="text-white">estimated total</span>
                        </div>
                        <p class="small text-white mt-2 mb-0">₱260/kg × ~0.5kg</p>
                        <p class="small text-white italic">*Final price based on actual weight during packing</p>
                    </div>

                    <h5 class="fw-bold mb-3">Description</h5>
                    <p id="p-desc" class="text-white lh-lg"></p>

                    <div class="mt-4">
                        <label class="form-label small text-white fw-bold">Quantity</label>
                        <div class="input-group quantity-selector mb-4">
                            <button class="btn btn-outline-secondary border-0" onclick="updateQty(-1)">—</button>
                            <input type="number" id="qty" class="form-control bg-transparent border-0 text-center text-white" value="1" readonly>
                            <button class="btn btn-outline-secondary border-0" onclick="updateQty(1)">+</button>
                        </div>
                        <button class="btn btn-cyan btn-lg w-100 py-3 rounded-3 add-to-cart" id="add-btn">
                            <i class="bi bi-cart-plus me-2"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section class="mt-5 pt-5">
            <h3 class="fw-bold mb-4">Customer Reviews</h3>
            <div class="row g-3" id="reviews-container">
                </div>
        </section>

        <section class="mt-5 pt-5">
            <h3 class="fw-bold mb-4">Related Products</h3>
            <div class="row g-4" id="related-products-container">
                </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/product.js"></script>
    <script>
        // Load layout components
        fetch("../components/navbar.html").then(r => r.text()).then(d => document.getElementById("navbar").innerHTML = d);
        fetch("../components/footer.html").then(r => r.text()).then(d => document.getElementById("footer-container").innerHTML = d);
        
        // Load product logic (Details + Related)
        document.addEventListener('DOMContentLoaded', () => {
            renderProductDetails();
        });
    </script>
</body>
</html>
