<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catalog | PoultryMart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- HEADER / HERO -->
  <section class="catalog-hero">
    <div class="container text-center">
      <h1>Browse Products</h1>
      <p>Fresh poultry products available for delivery</p>
    </div>
  </section>

  <!-- CATALOG -->
  <section id="catalog" class="py-5">
    <div class="container">

      <!-- FILTER BAR -->
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">

        <select id="categoryFilter" class="form-select w-auto">
          <option value="all">All Categories</option>
          <option>Whole Birds</option>
          <option>Prime Cuts</option>
          <option>Boneless Cuts</option>
          <option>Minced & Ground Poultry</option>
          <option>Giblets & Offal</option>
          <option>Ready to Cook & Processed</option>
          <option>Specialty Poultry</option>
          <option>Eggs</option>
        </select>

      </div>

      <!-- PRODUCTS -->
      <div class="row g-4" id="catalog-container"></div>

    </div>
  </section>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Components -->
  <script>
    fetch("../components/navbar.html")
      .then(res => res.text())
      .then(data => document.getElementById("navbar").innerHTML = data);

    fetch("../components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer-container").innerHTML = data);
  </script>

  <!-- LOGIC -->
  <script src="../js/cart.js"></script>
  <script src="../js/product.js"></script>

  <script>
    renderProducts("catalog-container");
  </script>

</body>
</html>
