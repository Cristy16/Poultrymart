<div class="glass-panel p-3 mb-3 rounded-4 border-light-subtle d-flex align-items-center gap-3">
    <img src="../{{image}}" class="rounded-3" alt="{{name}}" style="width: 100px; height: 100px; object-fit: cover;">
    
    <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h6 class="fw-bold mb-0 text-white">{{name}}</h6>
                <small class="text-muted d-block">{{category}}</small>
                <small class="text-white-50">₱{{price}}/kg × ~{{weight}}kg</small>
            </div>
            <button class="btn btn-link text-danger p-0 remove-item" onclick="removeFromCart('{{id}}')">
                <i class="bi bi-trash"></i>
            </button>
        </div>

        <div class="d-flex justify-content-between align-items-end mt-2">
            <div class="d-flex align-items-center gap-3">
                <span class="small text-white">Quantity:</span>
                <div class="input-group">
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeCartQty('{{id}}', -1)">-</button>
                    <span class="px-3 small pt-1 text-white">{{qty}}</span>
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeCartQty('{{id}}', 1)">+</button>
                </div>
            </div>
            <div class="text-end">
                <small class="text-muted d-block" style="font-size: 0.7rem;">Estimated</small>
                <span class="fw-bold text-cyan fs-5">₱{{itemTotal}}</span>
            </div>
        </div>
    </div>
</div>
