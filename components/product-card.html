<div class="col-12 col-sm-6 col-lg-3">
  <div class="product-card h-100 shadow-sm border-0">
    
    <a href="{{link}}" class="text-decoration-none">
        <div class="product-img">
          <img src="{{image}}" alt="{{name}}" class="img-fluid">
          <span class="badge bg-info">{{badge}}</span>
        </div>

        <div class="product-body p-3">
          <h6 class="text-white mb-1">{{name}}</h6>
          <small class="text-muted d-block mb-2">{{category}}</small>

          <div class="rating small text-warning">
            ★ {{rating}} <span class="text-muted">({{reviews}})</span>
          </div>

          <h5 class="price mt-2 text-cyan">₱{{price}} <small class="text-muted" style="font-size: 0.7rem;">est.</small></h5>
        </div>
    </a>

    <div class="px-3 pb-3">
        <button class="btn btn-cyan w-100 mt-2 add-to-cart" data-id="{{id}}">
            <i class="bi bi-cart"></i> Add to Cart
        </button>
    </div>

  </div>
</div>
