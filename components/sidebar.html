<div class="offcanvas-lg offcanvas-start sidebar-wrapper" tabindex="-1" id="sidebarMenu">
    <aside class="sidebar d-flex flex-column p-3 border-end border-secondary border-opacity-25 bg-dark-card vh-100" style="width: 280px;">
        
        <div class="d-lg-none text-end mb-2">
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
        </div>

        <div class="d-flex align-items-center gap-2 mb-4 px-2">
            <div class="logo-icon bg-cyan p-1 rounded-circle">
                <i class="bi bi-egg-fried text-dark px-1"></i>
            </div>
            <span class="fw-bold fs-5 text-white">PoultryMart</span>
        </div>
        
        <small id="role-label" class="text-info px-2 mb-4 d-block text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;"></small>

        <nav class="nav flex-column gap-2 flex-grow-1" id="sidebar-nav"></nav>

        <div class="mt-auto border-top border-secondary border-opacity-25 pt-3">
            <div class="glass-panel p-3 rounded-4 mb-3 d-flex align-items-center gap-3">
                <div class="avatar bg-secondary rounded-circle" style="width: 40px; height: 40px; flex-shrink: 0;">
                    <i class="bi bi-person-fill text-dark d-flex justify-content-center mt-2"></i>
                </div>
                <div class="overflow-hidden">
                    <h6 id="user-name" class="mb-0 small fw-bold text-white text-truncate">User Name</h6>
                    <small id="user-email" class="text-muted text-truncate d-block" style="font-size: 0.7rem;">user@email.com</small>
                </div>
            </div>
            <button class="btn btn-outline-danger w-100 rounded-pill py-2 border-opacity-25" onclick="logout()">
                <i class="bi bi-box-arrow-left me-2"></i> Logout
            </button>
        </div>
    </aside>
</div>
